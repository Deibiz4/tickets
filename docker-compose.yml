  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - NODE_OPTIONS=--max-old-space-size=384
      - JWT_EXPIRES_IN=24h
      - CORS_ORIGIN=http://localhost:5175
    restart: on-failure
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 450M
          cpus: '0.6'
        reservations:
          memory: 200M
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:3000 || exit 1" ]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 120s
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
